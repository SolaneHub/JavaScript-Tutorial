<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todoBox">
      <h1>Task Manager</h1>
      <div class="boxTextSubmit">
        <input
          type="text"
          name="taskName"
          id="taskName"
          placeholder="What needs to be done?"
        />
        <button type="submit" id="taskButtonSubmit">Add Task</button>
      </div>
      <div class="boxTasksList" id="task"></div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
